<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설교 영상으로 이동</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, #0d1b3e 0%, #1a3a6b 40%, #0d4a7a 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .box { max-width: 360px; text-align: center; line-height: 1.7; }
    .spinner {
      width: 38px; height: 38px; margin: 0 auto 16px;
      border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #c8a84b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; margin-bottom: 10px; }
    p { font-size: 14px; color: rgba(255,255,255,0.85); }
    .btn {
      display: inline-block;
      margin-top: 18px;
      background: #c8a84b;
      color: #0d1b3e;
      font-weight: 700;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box" id="box">
    <div class="spinner"></div>
    <p>설교 영상으로 이동 중…</p>
  </div>

  <script>
    // 책자 QR이 가리키는 고정 주소: .../go/?no=회차번호
    // 해당 회차의 설교 영상 주소를 verses.json에서 찾아 리다이렉트한다.
    // 아직 영상 주소가 비어 있으면 "준비 중" 안내를 보여준다.
    const DATA_URLS = [
      "../verses.json",
      "https://script.google.com/macros/s/AKfycbzO4GDAy0hJBbZ-L3hVuZQI4cqnjiZdy2afUujnxmmAr8NAh1lJURhrfT37PaFanPR4PA/exec",
    ];

    (async function () {
      const box = document.getElementById("box");
      const show = (html) => (box.innerHTML = html);
      const no = parseInt(new URLSearchParams(location.search).get("no"), 10);

      if (!no) {
        show("<h2>잘못된 주소입니다</h2><p>QR을 다시 확인해 주세요.</p><a class='btn' href='../'>암송 테스트 바로가기</a>");
        return;
      }

      let verses = null;
      for (const url of DATA_URLS) {
        try {
          const res = await fetch(url, { cache: "no-cache" });
          const data = await res.json();
          if (data.verses && data.verses.length) { verses = data.verses; break; }
        } catch (e) { /* 다음 소스로 폴백 */ }
      }

      if (!verses) {
        show("<h2>잠시 후 다시 시도해 주세요</h2><p>데이터를 불러오지 못했습니다.</p><a class='btn' href='../'>암송 테스트 바로가기</a>");
        return;
      }

      const v = verses.find((x) => x.no === no);
      if (v && v.url) {
        location.replace(v.url); // 설교 영상으로 직행
      } else {
        show(
          `<h2>설교 영상 준비 중입니다</h2><p>${no}회차 설교 영상이 아직 등록되지 않았습니다.<br>곧 업로드될 예정이니 잠시 후 다시 스캔해 주세요.</p><a class='btn' href='../'>암송 테스트 바로가기</a>`
        );
      }
    })();
  </script>
</body>
</html>
