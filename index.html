<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    // 야간(다크) 모드: 저장값 없으면 시스템 설정 따름 — 깜빡임 방지를 위해 head에서 먼저 적용
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (!t) t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        if (t === "dark") document.documentElement.classList.add("dark");
      } catch (e) {}
    })();
  </script>
  <title>성경말씀 암송 | 오직 성경, 말씀이 답이다!</title>
  <meta name="description" content="주의 말씀은 내 발에 등이요 내 길에 빛이니이다." />

  <!-- 파비콘(브라우저 탭 아이콘) — 글씨 없는 그림만 -->
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />

  <!-- 카카오톡/SNS 공유 미리보기 (Open Graph) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="성경말씀 암송 | 오직 성경, 말씀이 답이다!" />
  <meta property="og:description" content="주의 말씀은 내 발에 등이요 내 길에 빛이니이다." />
  <meta property="og:image" content="https://sewoongkim1.github.io/bible-memorize-app/og-cover.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://sewoongkim1.github.io/bible-memorize-app/" />
  <meta property="og:site_name" content="고척교회 제자양육부 신앙운동팀" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="성경말씀 암송 | 오직 성경, 말씀이 답이다!" />
  <meta name="twitter:description" content="주의 말씀은 내 발에 등이요 내 길에 빛이니이다." />
  <meta name="twitter:image" content="https://sewoongkim1.github.io/bible-memorize-app/og-cover.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="kakao-redirect.js"></script>
</head>
<body>
  <!-- 앱 시작 스플래시 화면 -->
  <div id="splash">
    <div class="splash-inner">
      <img id="splash-logo" src="https://sewoongkim1.github.io/summer-bible/logo3.png" alt="고척교회" />
      <div class="splash-title">오직 성경, 말씀이 답이다!</div>
      <div class="splash-sub">주의 말씀은 내 발에 등이요<br>내 길에 빛이니이다</div>
    </div>
  </div>
  <script>
    window.__splashStart = Date.now();
    window.hideSplash = function () {
      var s = document.getElementById("splash");
      if (!s) return;
      s.classList.add("hide");
      setTimeout(function () { if (s && s.parentNode) s.parentNode.removeChild(s); }, 450);
    };
    setTimeout(window.hideSplash, 7000); // 안전장치(app.js가 최소 5초 유지 후 닫음)
  </script>

  <!-- 등록 시스템과 동일한 브랜드 헤더 -->
  <div class="page-header">
    <button id="theme-toggle" class="theme-toggle" aria-label="야간 모드 전환">🌙</button>
    <div class="logo-wrap">
      <img src="https://sewoongkim1.github.io/summer-bible/logo3.png" alt="고척교회 로고" />
      <div class="logo-tagline">
        <span class="tagline-main">오직 성경, 말씀이 답이다!</span>
        <span class="tagline-sub">주의 말씀은 내 발에 등이요</span>
        <span class="tagline-sub">내 길에 빛이니이다.</span>
        <span class="tagline-sub">시편 119편 105절</span>
      </div>
    </div>
    <p class="hero-subtitle">제자양육부 신앙운동팀</p>
  </div>

  <main id="app">
    <span class="page-title">오직 성경(Sola Scriptura), 오직 은혜(Sola Gratia)</span>
    <div id="verse-list" class="verse-grid">
      <!-- 구절 카드들이 여기 렌더링됨 -->
    </div>
  </main>

  <script>
    // 야간 모드 토글 버튼
    (function () {
      var btn = document.getElementById("theme-toggle");
      if (!btn) return;
      function sync() { btn.textContent = document.documentElement.classList.contains("dark") ? "☀️" : "🌙"; }
      btn.addEventListener("click", function () {
        var dark = document.documentElement.classList.toggle("dark");
        try { localStorage.setItem("theme", dark ? "dark" : "light"); } catch (e) {}
        sync();
      });
      sync();
    })();
  </script>
  <script src="app.js"></script>
</body>
</html>
